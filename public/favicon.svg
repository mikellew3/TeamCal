<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#1f6b6b"/>
  <!-- Simplified 4-arm cart for small sizes -->
  <g fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Boom -->
    <line x1="14" y1="22" x2="50" y2="22"/>
    <!-- 4 pendants -->
    <line x1="20" y1="24" x2="20" y2="46"/>
    <line x1="28" y1="24" x2="28" y2="46"/>
    <line x1="36" y1="24" x2="36" y2="46"/>
    <line x1="44" y1="24" x2="44" y2="46"/>
  </g>
</svg>
