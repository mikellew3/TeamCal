<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="MG Surgical Associates">
  <rect width="512" height="512" fill="#ffffff"/>
  <g fill="#ffffff" stroke="#0c1f2a" stroke-width="9" stroke-linejoin="round" stroke-linecap="round">

    <!-- LEFT: Surgeon console pedestal -->
    <g>
      <!-- Top handle bar -->
      <rect x="142" y="160" width="116" height="36" rx="18"/>
      <!-- Stem -->
      <rect x="187" y="194" width="26" height="40"/>
      <!-- Main column -->
      <rect x="148" y="232" width="104" height="200" rx="22"/>
      <!-- Top platform -->
      <rect x="112" y="430" width="176" height="28" rx="14"/>
      <!-- Lower platform -->
      <rect x="92"  y="458" width="216" height="38" rx="19"/>
    </g>

    <!-- Teal inset inside the column -->
    <rect x="170" y="252" width="60" height="160" rx="16" fill="#5cc3c5"/>

    <!-- RIGHT: Patient cart boom + 4 arms -->
    <g>
      <!-- Tiny teal cap on leftmost arm shoulder -->
      <rect x="318" y="184" width="34" height="20" rx="10" fill="#5cc3c5"/>
      <!-- Horizontal boom -->
      <rect x="296" y="200" width="180" height="28" rx="14"/>

      <!-- ARM 1 (leftmost, angles slightly right) -->
      <g>
        <rect x="312" y="226" width="40" height="68" rx="16"/>
        <g transform="rotate(12, 350, 320)">
          <rect x="330" y="296" width="40" height="68" rx="16"/>
        </g>
        <line x1="368" y1="370" x2="376" y2="416" stroke-width="6"/>
      </g>

      <!-- ARM 2 -->
      <g>
        <rect x="354" y="226" width="40" height="68" rx="16"/>
        <g transform="rotate(5, 380, 320)">
          <rect x="360" y="296" width="40" height="68" rx="16"/>
        </g>
        <line x1="384" y1="368" x2="390" y2="414" stroke-width="6"/>
      </g>

      <!-- ARM 3 -->
      <g>
        <rect x="396" y="226" width="40" height="68" rx="16"/>
        <g transform="rotate(-5, 416, 320)">
          <rect x="396" y="296" width="40" height="68" rx="16"/>
        </g>
        <line x1="408" y1="368" x2="402" y2="414" stroke-width="6"/>
      </g>

      <!-- ARM 4 (rightmost, angles inward to the left) -->
      <g>
        <rect x="438" y="226" width="40" height="68" rx="16"/>
        <g transform="rotate(-12, 460, 320)">
          <rect x="422" y="296" width="40" height="68" rx="16"/>
        </g>
        <line x1="424" y1="370" x2="416" y2="416" stroke-width="6"/>
      </g>
    </g>
  </g>
</svg>
