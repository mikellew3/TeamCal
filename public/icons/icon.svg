<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="MG Surgical Associates">
  <rect width="512" height="512" rx="96" fill="#1f6b6b"/>
  <!-- Calendar-grid corner dots -->
