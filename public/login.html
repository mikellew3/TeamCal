<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Sign In · MGH PA Team Calendar</title>
  <meta name="theme-color" content="#1f6b6b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="PA Calendar" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#e8e6e1; --paper:#ffffff; --paper-warm:#fafaf7;
      --ink:#1a2a33; --ink-2:#3a4a52; --muted:#6b7780;
      --line:rgba(26,42,51,0.14); --line-strong:rgba(26,42,51,0.28);
      --accent:#1f6b6b; --accent-soft:#e6efef; --accent-deep:#154f4f;
      --pos:#2f7a4d; --neg:#b54545; --warn:#b8801f;
    }
    *,*::before,*::after { box-sizing:border-box; }
    html,body {
      margin:0;padding:0;background:var(--bg);
      font-family:'Inter',system-ui,sans-serif;color:var(--ink);
      -webkit-font-smoothing:antialiased;
      font-feature-settings:'tnum' 1;
    }
    body.login-page {
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      padding:40px 20px;
    }
    .login-card {
      background:var(--paper);max-width:420px;width:100%;
      padding:40px 36px 32px;
      box-shadow:0 8px 32px rgba(0,0,0,0.12),0 1px 3px rgba(0,0,0,0.06);
      border-radius:2px;
    }
    .login-card .eyebrow {
      font-size:10px;letter-spacing:0.18em;text-transform:uppercase;
      color:var(--accent);font-weight:600;margin-bottom:6px;
    }
    .login-card h1 {
      font-family:'Source Serif 4',serif;
      font-size:24px;font-weight:600;margin:0 0 4px;
      letter-spacing:-0.005em;line-height:1.1;
    }
    .login-card .login-sub { font-size:12px;color:var(--ink-2);margin-bottom:22px; }
    .login-tabs {
      display:flex;gap:0;border-bottom:1px solid var(--line-strong);
      margin-bottom:22px;
    }
    .login-tabs .tab {
      flex:1;
      font-family:'Inter';
      font-size:11px;letter-spacing:0.10em;text-transform:uppercase;
      font-weight:600;color:var(--muted);
      padding:10px 0;text-align:center;cursor:pointer;
      border-bottom:2px solid transparent;background:transparent;border-left:0;border-right:0;border-top:0;
      margin-bottom:-1px;
      transition:color 120ms ease,border-color 120ms ease;
    }
    .login-tabs .tab.active { color:var(--ink);border-bottom-color:var(--ink); }
    .login-tabs .tab:focus-visible { outline:2px solid var(--accent);outline-offset:2px; }
    .field { margin-bottom:14px; }
    .field label {
      display:block;
      font-size:10px;letter-spacing:0.10em;text-transform:uppercase;
      color:var(--muted);font-weight:600;margin-bottom:5px;
    }
    .field input {
      width:100%;
      border:1px solid var(--line-strong);
      padding:8px 11px;
      font-family:'Inter';font-size:13px;
      background:var(--paper);color:var(--ink);
      border-radius:2px;
    }
    .field input:focus {
      outline:none;border-color:var(--accent);
      box-shadow:0 0 0 3px var(--accent-soft);
    }
    .login-card button[type=submit] {
      width:100%;padding:11px 14px;
      background:var(--accent);color:var(--paper);border:1px solid var(--accent);
      font-family:'Inter';font-size:13px;font-weight:600;
      letter-spacing:0.02em;
      margin-top:6px;border-radius:2px;cursor:pointer;
      transition:background 120ms ease,border-color 120ms ease;
    }
    .login-card button[type=submit]:hover:not(:disabled) {
      background:var(--accent-deep);border-color:var(--accent-deep);
    }
    .login-card button[type=submit]:disabled { opacity:0.4;cursor:not-allowed; }
    .login-msg { font-size:12px;margin-top:14px;line-height:1.45; }
    .login-msg.error { color:var(--neg); }
    .login-msg.success { color:var(--pos); }
    .login-msg.info { color:var(--ink-2); }
    .hidden { display:none !important; }
    .login-footer {
      margin-top:28px;padding-top:14px;
      border-top:1px solid var(--line);
      font-size:10px;letter-spacing:0.04em;color:var(--muted);
      text-align:center;
    }
    .login-helper {
      font-size:11px;color:var(--muted);margin-top:-4px;margin-bottom:10px;line-height:1.45;
    }
    .pw-rule { font-size:10px;color:var(--muted);margin-top:-8px;margin-bottom:8px;letter-spacing:0.02em; }
  </style>
</head>
<body class="login-page">
  <div class="login-card" role="main">
    <div class="eyebrow">MG Surgical Associates · Robotic Surgery PA Team</div>
    <h1>Team Calendar</h1>
    <div class="login-sub">Sign in to view the calendar and request time away.</div>

    <div class="login-tabs" role="tablist">
      <button class="tab active" data-tab="signin" role="tab" aria-selected="true">Sign In</button>
      <button class="tab" data-tab="signup" role="tab" aria-selected="false">First Time?</button>
    </div>

    <!-- Sign In -->
    <form id="signin-form" autocomplete="on">
      <div class="field">
        <label for="signin-email">Email</label>
        <input id="signin-email" type="email" required autocomplete="username" />
      </div>
      <div class="field">
        <label for="signin-password">Password</label>
        <input id="signin-password" type="password" required autocomplete="current-password" />
      </div>
      <button type="submit" id="signin-btn">Sign In</button>
      <div class="login-msg" id="signin-msg" role="status" aria-live="polite"></div>
    </form>

    <!-- Sign Up -->
    <form id="signup-form" class="hidden" autocomplete="on">
      <div class="login-helper">
        Your email must already be on the team roster. Mike will have added you in advance.
      </div>
      <div class="field">
        <label for="signup-email">Email</label>
        <input id="signup-email" type="email" required autocomplete="username" />
      </div>
      <div id="signup-pw-block" class="hidden">
        <div class="field">
          <label for="signup-password">Create password</label>
          <input id="signup-password" type="password" minlength="8" autocomplete="new-password" />
        </div>
        <div class="pw-rule">Minimum 8 characters.</div>
      </div>
      <button type="submit" id="signup-btn" disabled>Check Email</button>
      <div class="login-msg" id="signup-msg" role="status" aria-live="polite"></div>
    </form>

    <div class="login-footer">MGH Robotic Surgery PA Team · Calendar</div>
  </div>

  <script>
    window.__bootStarted = false;
    window.addEventListener('error', function (e) {
      var m = document.getElementById('signin-msg');
      if (m) { m.className = 'login-msg error'; m.textContent = 'Script error: ' + (e?.message || 'unknown') + ' — see console.'; }
    });
    setTimeout(function () {
      if (window.__bootStarted) return;
      var m = document.getElementById('signin-msg');
      if (m && !m.textContent) { m.className = 'login-msg error'; m.textContent = 'Page script did not start — likely the Supabase CDN was blocked. Check console (F12).'; }
    }, 6000);
  </script>

  <script src="/vendor/supabase.js"></script>
  <script type="module">
    window.__bootStarted = true;
    let createClient;
    if (window.supabase && window.supabase.createClient) {
      ({ createClient } = window.supabase);
    } else {
      var m = document.getElementById('signin-msg');
      if (m) { m.className = 'login-msg error'; m.textContent = 'Could not load Supabase library — check /vendor/supabase.js deployed.'; }
      throw new Error('supabase global missing');
    }

    let supabase = null;
    async function initSupabase() {
      if (supabase) return supabase;
      const r = await fetch('/api/env');
      if (!r.ok) throw new Error(`API error ${r.status} on /api/env`);
      let env;
      try { env = await r.json(); } catch { throw new Error('Non-JSON response from /api/env'); }
      if (!env.SUPABASE_URL || !env.SUPABASE_ANON_KEY) {
        throw new Error('Supabase env not configured (set SUPABASE_URL + SUPABASE_ANON_KEY in Vercel)');
      }
      supabase = createClient(env.SUPABASE_URL, env.SUPABASE_ANON_KEY);
      return supabase;
    }

    // Tabs
    const tabs = document.querySelectorAll('.tab');
    const signinForm = document.getElementById('signin-form');
    const signupForm = document.getElementById('signup-form');
    tabs.forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));
    function switchTab(name) {
      tabs.forEach(t => {
        const active = t.dataset.tab === name;
        t.classList.toggle('active', active);
        t.setAttribute('aria-selected', active ? 'true' : 'false');
      });
      signinForm.classList.toggle('hidden', name !== 'signin');
      signupForm.classList.toggle('hidden', name !== 'signup');
      clearMsg(document.getElementById('signin-msg'));
      clearMsg(document.getElementById('signup-msg'));
    }

    function setMsg(el, text, kind) {
      el.className = 'login-msg' + (kind ? ' ' + kind : '');
      el.textContent = text || '';
    }
    function clearMsg(el) { setMsg(el, '', ''); }

    // Already signed in? Bounce to /index.html.
    (async () => {
      try {
        const supa = await initSupabase();
        const { data } = await supa.auth.getSession();
        if (data?.session) window.location.replace('/index.html');
      } catch (e) {
        console.error('login init', e);
        const m = document.getElementById('signin-msg');
        setMsg(m, 'Configuration error: ' + (e?.message || 'backend not reachable.'), 'error');
      }
    })();

    // Sign In handler
    signinForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('signin-msg');
      const btn = document.getElementById('signin-btn');
      const email = document.getElementById('signin-email').value.trim();
      const password = document.getElementById('signin-password').value;
      if (!email || !password) return;
      btn.disabled = true;
      setMsg(msg, 'Signing in…', 'info');
      try {
        const supa = await initSupabase();
        const { error } = await supa.auth.signInWithPassword({ email, password });
        if (error) {
          setMsg(msg, error.message || 'Could not sign in.', 'error');
          btn.disabled = false;
          return;
        }
        window.location.replace('/index.html');
      } catch (err) {
        console.error(err);
        setMsg(msg, 'Unexpected error. Try again.', 'error');
        btn.disabled = false;
      }
    });

    // Sign Up: two-step flow.
    const signupEmail = document.getElementById('signup-email');
    const signupPwBlock = document.getElementById('signup-pw-block');
    const signupBtn = document.getElementById('signup-btn');
    let eligible = false;

    signupEmail.addEventListener('input', () => {
      eligible = false;
      signupPwBlock.classList.add('hidden');
      signupBtn.textContent = 'Check Email';
      signupBtn.disabled = !signupEmail.value.includes('@');
      clearMsg(document.getElementById('signup-msg'));
    });

    signupEmail.addEventListener('blur', async () => {
      const email = signupEmail.value.trim();
      if (!email || !email.includes('@')) return;
      const msg = document.getElementById('signup-msg');
      setMsg(msg, 'Checking eligibility…', 'info');
      try {
        const r = await fetch('/api/check-eligible', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const j = await r.json();
        if (!r.ok) throw new Error(j.error || 'failed');
        if (j.eligible) {
          eligible = true;
          signupPwBlock.classList.remove('hidden');
          signupBtn.textContent = 'Create Account';
          signupBtn.disabled = false;
          setMsg(msg, 'Email recognized. Choose a password to continue.', 'success');
        } else {
          eligible = false;
          signupPwBlock.classList.add('hidden');
          signupBtn.textContent = 'Check Email';
          signupBtn.disabled = false;
          setMsg(msg, 'That email is not on the team roster yet. Contact Mike to get added.', 'error');
        }
      } catch (err) {
        console.error(err);
        setMsg(msg, 'Could not check eligibility. Try again.', 'error');
      }
    });

    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('signup-msg');
      const email = signupEmail.value.trim();
      const password = document.getElementById('signup-password').value;
      if (!eligible) {
        signupEmail.dispatchEvent(new Event('blur'));
        return;
      }
      if (!password || password.length < 8) {
        setMsg(msg, 'Password must be at least 8 characters.', 'error');
        return;
      }
      signupBtn.disabled = true;
      setMsg(msg, 'Creating account…', 'info');
      try {
        const supa = await initSupabase();
        const { error } = await supa.auth.signUp({
          email, password,
          options: {
            emailRedirectTo: window.location.origin + '/login.html',
          },
        });
        if (error) {
          setMsg(msg, error.message || 'Could not create account.', 'error');
          signupBtn.disabled = false;
          return;
        }
        setMsg(msg, 'Account created. Check your email for a confirmation link, then come back here to sign in.', 'success');
      } catch (err) {
        console.error(err);
        setMsg(msg, 'Unexpected error. Try again.', 'error');
        signupBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
